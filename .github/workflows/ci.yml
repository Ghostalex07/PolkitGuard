name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v ./...

    - name: Vet
      run: go vet ./...

    - name: Format check
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Files need formatting:"
          gofmt -l .
          exit 1
        fi