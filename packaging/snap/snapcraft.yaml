name: polkitguard
version: "1.17.0"
summary: Security scanner for Linux Polkit policies
description: |
  PolkitGuard is a security auditing tool for Linux Polkit policies.
  It detects dangerous configurations that can lead to privilege escalation.
icon: https://raw.githubusercontent.com/Ghostalex07/PolkitGuard/main/docs/icon.png
license: MIT

base: core18
architectures:
  - amd64

parts:
  polkitguard:
    plugin: go
    source: https://github.com/Ghostalex07/PolkitGuard/archive/refs/tags/v1.17.0.tar.gz
    go-buildflags:
      - -o
      - bin/polkitguard
      - ./cmd/scan

apps:
  polkitguard:
    command: bin/polkitguard
    plugs:
      - network
      - home-dir
      - etc-polkit-1
      - usr-share-polkit-1
    aliases:
      - polkitguard

hooks:
  configure:
    - exec: install -Dm755 bin/polkitguard $SNAP/usr/bin/polkitguard
    - mkdirname /etc/polkit-1/rules.d $SNAP/etc/polkit-1/rules.d
    - mkdirname /var/log/polkitguard $SNAP/var/log/polkitguard

environment:
  PATH: "$SNAP/usr/bin:$PATH"
  XDG_CONFIG_HOME: "$SNAP/etc/xdg"